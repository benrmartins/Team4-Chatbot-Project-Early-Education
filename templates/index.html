<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ bot_name }} Chat</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 760px;
      margin: 32px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      font-weight: 600;
    }
    .messages {
      padding: 16px;
      min-height: 320px;
      max-height: 480px;
      overflow-y: auto;
    }
    .msg {
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    .user { background: #e8f1ff; }
    .bot { background: #f1f3f5; }
    .status { color: #666; font-size: 14px; margin: 8px 0; }
    .bot-response {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .answer {
      font-weight: 500;
    }
    .section-block {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #dde2ea;
      border-radius: 8px;
      padding: 10px;
    }
    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #516072;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .link-list, .evidence-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .citation-link {
      color: #1d4ed8;
      text-decoration: none;
      word-break: break-word;
    }
    .citation-link:hover {
      text-decoration: underline;
    }
    .evidence-card {
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .evidence-meta {
      color: #5f6c7b;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .evidence-snippet {
      color: #1f2937;
    }
    .retrieval-note {
      color: #92400e;
      font-size: 13px;
      font-weight: 600;
    }
    .composer {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">{{ bot_name }}</div>
    <div id="messages" class="messages">
      <div class="msg bot">{{ onboard_prompt }}</div>
    </div>
    <form id="chatForm" class="composer">
      <input id="messageInput" type="text" placeholder="Type your question..." autocomplete="off" required>
      <button type="submit">Send</button>
      <button type="button" id="resetBtn">Reset</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("messageInput");
    const messages = document.getElementById("messages");
    const resetBtn = document.getElementById("resetBtn");

    function appendMessage(text, className) {
      const div = document.createElement("div");
      div.className = `msg ${className}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendStatus(text) {
      const div = document.createElement("div");
      div.className = "status";
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function appendBotResponse(payload) {
      const wrapper = document.createElement("div");
      wrapper.className = "msg bot";

      const response = document.createElement("div");
      response.className = "bot-response";

      const answer = document.createElement("div");
      answer.className = "answer";
      answer.textContent = payload.reply || "";
      response.appendChild(answer);

      const retrieval = payload.retrieval || {};
      if (retrieval.low_confidence) {
        const confidence = document.createElement("div");
        confidence.className = "retrieval-note";
        confidence.textContent = "Retrieval confidence is low for this question.";
        response.appendChild(confidence);
      }

      if ((payload.citations || []).length) {
        const section = document.createElement("div");
        section.className = "section-block";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Citations";
        section.appendChild(title);

        const list = document.createElement("div");
        list.className = "link-list";
        for (const citation of payload.citations) {
          const link = document.createElement("a");
          link.className = "citation-link";
          link.href = citation.url || "#";
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = `${citation.title || "Untitled"}${citation.url ? " | " + citation.url : ""}`;
          list.appendChild(link);
        }
        section.appendChild(list);
        response.appendChild(section);
      }

      if ((payload.evidence || []).length) {
        const section = document.createElement("div");
        section.className = "section-block";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = "Retrieved Evidence";
        section.appendChild(title);

        const list = document.createElement("div");
        list.className = "evidence-list";

        for (const item of payload.evidence) {
          const card = document.createElement("div");
          card.className = "evidence-card";

          const meta = document.createElement("div");
          meta.className = "evidence-meta";
          const matchedTerms = (item.matched_terms || []).join(", ") || "n/a";
          meta.textContent = `Rank ${item.rank || "?"} | ${item.title || "Untitled"} | matched terms: ${matchedTerms}`;
          card.appendChild(meta);

          const snippet = document.createElement("div");
          snippet.className = "evidence-snippet";
          snippet.textContent = item.snippet || "";
          card.appendChild(snippet);

          list.appendChild(card);
        }

        section.appendChild(list);
        response.appendChild(section);
      }

      wrapper.appendChild(response);
      messages.appendChild(wrapper);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      appendMessage(message, "user");
      input.value = "";
      input.focus();

      const statusEl = appendStatus("thinking...");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const payload = await response.json();
        statusEl.remove();

        if (!response.ok) {
          appendMessage(payload.error || "Request failed.", "bot");
          return;
        }

        appendBotResponse(payload);
      } catch (error) {
        statusEl.remove();
        appendMessage("Network error. Please try again.", "bot");
      }
    });

    resetBtn.addEventListener("click", async () => {
      await fetch("/reset", { method: "POST" });
      messages.innerHTML = "";
      appendMessage({{ onboard_prompt|tojson }}, "bot");
      input.focus();
    });
  </script>
</body>
</html>
