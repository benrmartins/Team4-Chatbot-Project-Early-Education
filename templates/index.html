<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ bot_name }} Chat</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f7fb;
      color: #222;
    }
    .container {
      max-width: 760px;
      margin: 32px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      font-weight: 600;
    }
    .messages {
      padding: 16px;
      min-height: 320px;
      max-height: 480px;
      overflow-y: auto;
    }
    .msg {
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    .user { background: #e8f1ff; }
    .bot { background: #f1f3f5; }
    .status { color: #666; font-size: 14px; margin: 8px 0; }
    .composer {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">{{ bot_name }}</div>
    <div id="messages" class="messages">
      <div class="msg bot">{{ onboard_prompt }}</div>
    </div>
    <form id="chatForm" class="composer">
      <input id="messageInput" type="text" placeholder="Type your question..." autocomplete="off" required>
      <button type="submit">Send</button>
      <button type="button" id="resetBtn">Reset</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("messageInput");
    const messages = document.getElementById("messages");
    const resetBtn = document.getElementById("resetBtn");

    function appendMessage(text, className) {
      const div = document.createElement("div");
      div.className = `msg ${className}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendStatus(text) {
      const div = document.createElement("div");
      div.className = "status";
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      appendMessage(message, "user");
      input.value = "";
      input.focus();

      const statusEl = appendStatus("thinking...");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const payload = await response.json();
        statusEl.remove();

        if (!response.ok) {
          appendMessage(payload.error || "Request failed.", "bot");
          return;
        }

        appendMessage(payload.reply || "", "bot");
      } catch (error) {
        statusEl.remove();
        appendMessage("Network error. Please try again.", "bot");
      }
    });

    resetBtn.addEventListener("click", async () => {
      await fetch("/reset", { method: "POST" });
      messages.innerHTML = "";
      appendMessage({{ onboard_prompt|tojson }}, "bot");
      input.focus();
    });
  </script>
</body>
</html>
